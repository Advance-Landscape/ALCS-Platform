:root{
  --paper:#F6F4EF; --ink:#2C2B26; --muted:#84816F; --line:#E2DFD2;
  --pine:#6B7048; --pine-dark:#505435; --pine-soft:#E9EAD8;
  --amber:#A2603F; --amber-soft:#F2E3D8;
  --blue:#67767F; --blue-soft:#E4E9EA;
  --danger:#9A4F38;
}
*{box-sizing:border-box}
.pp-root{display:flex;height:100vh;background:var(--paper);color:var(--ink);
  font-family:'Public Sans',-apple-system,'Segoe UI',sans-serif;font-size:14px}
.pp-root ::selection{background:var(--pine-soft)}
.serif{font-family:'Fraunces',Georgia,'Times New Roman',serif}
.sidebar{width:196px;flex-shrink:0;border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:18px 10px;gap:2px;background:#EEEFE3}
.brand{font-size:17px;font-weight:600;padding:4px 12px 16px;letter-spacing:-.2px}
.brand em{color:var(--pine);font-style:normal}
.navbtn{display:flex;align-items:center;gap:10px;padding:8px 12px;border:none;
  background:transparent;border-radius:8px;cursor:pointer;color:var(--muted);
  font:inherit;font-weight:500;text-align:left;width:100%}
.navbtn:hover{background:#E7E3DA;color:var(--ink)}
.navbtn.active{background:var(--pine-soft);color:var(--pine-dark)}
.navbtn:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{
  outline:2px solid var(--pine);outline-offset:1px}
.main{flex:1;overflow-y:auto;position:relative}
.page{max-width:880px;margin:0 auto;padding:34px 36px 80px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pine);font-weight:700}
h1.pagetitle{font-size:30px;font-weight:600;margin:4px 0 22px;letter-spacing:-.4px}
.panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
  background:#fff;color:var(--ink);border-radius:8px;padding:7px 12px;cursor:pointer;
  font:inherit;font-weight:500}
.btn:hover{border-color:#CBC4B6;background:#FAF8F4}
.btn-primary{background:var(--pine);border-color:var(--pine);color:#fff}
.btn-primary:hover{background:var(--pine-dark);border-color:var(--pine-dark)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);padding:5px 7px}
.btn-ghost:hover{background:#ECE8E0;color:var(--ink);border-color:transparent}
.btn:disabled{opacity:.5;cursor:default}
.inp,select.inp,textarea.inp{border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  font:inherit;background:#fff;color:var(--ink);width:100%}
.inp::placeholder{color:#A8ACB1}
.row{display:flex;gap:8px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;border-radius:999px;
  padding:2px 9px;font-weight:600}
.chip.pine{background:var(--pine-soft);color:var(--pine-dark)}
.chip.amber{background:var(--amber-soft);color:var(--amber)}
.chip.blue{background:var(--blue-soft);color:var(--blue)}
.chip.gray{background:#EBE7DF;color:var(--muted)}
.task{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid #ECE9E2}
.task:last-child{border-bottom:none}
.task .title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task.done .title{text-decoration:line-through;color:var(--muted)}
.checkbox{width:18px;height:18px;border-radius:6px;border:1.5px solid #C4BCAD;background:#fff;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.checkbox.on{background:var(--pine);border-color:var(--pine);color:#fff}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sect-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin:22px 0 6px}
.reminderbar{position:sticky;top:0;z-index:30;background:var(--amber-soft);
  border-bottom:1px solid #EBD9BC;color:#7A4A09;padding:9px 20px;display:flex;
  align-items:center;gap:10px;font-weight:500}
.briefing{border-left:3px solid var(--pine);background:#fff;border-radius:0 10px 10px 0;
  border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:18px 20px}
.briefing p{margin:0 0 10px;line-height:1.65;font-size:14.5px}
.briefing p:last-child{margin-bottom:0}
.kanban{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:20px}
.kcol{width:248px;flex-shrink:0;background:#EFECE5;border:1px solid var(--line);
  border-radius:10px;padding:10px}
.kcol.dragover{border-color:var(--pine);background:var(--pine-soft)}
.kcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 11px;
  margin-bottom:8px;cursor:grab}
.kcard:active{cursor:grabbing}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);
  border-radius:10px;overflow:hidden;background:var(--line);gap:1px}
.calhead{background:#EFECE5;padding:6px 4px;text-align:center;font-size:11px;font-weight:700;
  letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
.calday{background:#fff;min-height:84px;padding:5px;cursor:pointer;border:none;text-align:left;
  font:inherit;display:flex;flex-direction:column;gap:3px;vertical-align:top}
.calday:hover{background:#FAF8F4}
.calday.off{background:#F2EFE9;color:#B8B0A2}
.calday.week{min-height:180px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
.segbtn{border:none;background:transparent;padding:7px 13px;cursor:pointer;font:inherit;
  font-weight:600;color:var(--muted)}
.segbtn.on{background:var(--pine);color:#fff}
.segbtn:not(.on):hover{background:#EFECE5;color:var(--ink)}
.calday.sel{outline:2px solid var(--pine);outline-offset:-2px}
.calday .dnum{font-size:12px;font-weight:600}
.calday .dnum.today{background:var(--pine);color:#fff;border-radius:999px;width:20px;height:20px;
  display:inline-flex;align-items:center;justify-content:center}
.calitem{font-size:10.5px;border-radius:4px;padding:1px 5px;overflow:hidden;white-space:nowrap;
  text-overflow:ellipsis;font-weight:600}
.md{line-height:1.7;font-size:14.5px}
.md h1{font-size:22px;margin:14px 0 6px}.md h2{font-size:18px;margin:14px 0 6px}
.md h3{font-size:15px;margin:12px 0 4px}
.md p{margin:0 0 10px}.md ul,.md ol{margin:0 0 10px;padding-left:22px}
.md code{background:#ECE8E0;border-radius:4px;padding:1px 5px;font-size:13px;
  font-family:ui-monospace,Menlo,monospace}
.md pre{background:#ECE8E0;border-radius:8px;padding:12px;overflow-x:auto}
.md pre code{background:none;padding:0}
.md a{color:var(--pine);}
.md .wikilink{color:var(--pine);font-weight:600;cursor:pointer;border-bottom:1px dashed var(--pine)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;border-radius:10px;
  padding:11px 16px;font-weight:500;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.timerring{font-size:56px;font-weight:600;letter-spacing:1px;text-align:center}
.bar{background:var(--pine);border-radius:4px 4px 0 0;width:100%;min-height:2px}
@media (max-width:760px){
  .pp-root{flex-direction:column-reverse}
  .sidebar{width:100%;flex-direction:row;align-items:center;justify-content:space-around;
    border-right:none;border-top:1px solid var(--line);padding:6px 4px;
    padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
  .brand,.savestate{display:none}
  .navbtn{flex-direction:column;gap:3px;padding:8px 6px;font-size:10px;flex:1;justify-content:center;margin-top:0!important}
  .navbtn svg{width:21px;height:21px}
  .page{padding:20px 14px 30px}
  .btn{padding:9px 13px}
  .checkbox{width:22px;height:22px}
  .task{padding:11px 4px}
  .calday{min-height:62px}
  .calday.week{min-height:120px}
  .timerring{font-size:46px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
